name: Daily Top Option Trades

on:
  schedule:
    - cron: "45 10 * * 1-5"
      timezone: "America/New_York"
    - cron: "5 11 * * 1-5"
      timezone: "America/New_York"
    - cron: "20 16 * * 1-5"
      timezone: "America/New_York"
    - cron: "5 17 * * 1-5"
      timezone: "America/New_York"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Publish the daily edition or collect official closes"
        type: choice
        options:
          - publish
          - closing_prints
        required: true
        default: publish
      report_date:
        description: "Optional YYYY-MM-DD override"
        required: false
      force:
        description: "Replace an existing edition for the same date"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: daily-top-option-trades
  cancel-in-progress: false

jobs:
  generate:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_mode != 'closing_prints') ||
      github.event.schedule == '45 10 * * 1-5' ||
      github.event.schedule == '5 11 * * 1-5'
    runs-on: ubuntu-latest
    env:
      MARKET_DATA_PROVIDER: tt_bridge
      TT_BRIDGE_API_KEY: ${{ secrets.TT_BRIDGE_API_KEY }}
      TT_BRIDGE_BASE_URL: ${{ vars.TT_BRIDGE_BASE_URL }}
      TT_BRIDGE_QUOTE_BATCH_SIZE: "25"
      TT_BRIDGE_QUOTE_BATCH_CONCURRENCY: "2"
      OPTIONS_CHAIN_SYMBOL_LIMIT: "40"
      OPTIONS_MOVER_SLOTS: "18"
      OPTIONS_VOLUME_SLOTS: "7"
      PUBLISH_IDEA_COUNT: "5"
      PUBLISH_MAX_TOTAL_BASKET_RISK_DOLLARS: "800"
      MODEL_MIN_PUBLICATION_SCORE: "70"
      MODEL_MIN_PROBABILITY_MARGIN: "0.05"
      MODEL_MIN_POSITIVE_MODELS: "3"
      MODEL_MIN_CONSERVATIVE_EV_DOLLARS: "0"
      MODEL_MIN_LIQUIDITY_SCORE: "0.80"
      MODEL_MIN_MULTI_HORIZON_ALIGNMENT: "0.50"
      MODEL_MIN_SESSION_CONFIRMATION_MOVE_PCT: "0.0015"
      MODEL_REQUIRE_COMPLETE_LEG_DATA: "true"
      MODEL_REQUIRE_SESSION_CONFIRMATION: "true"
      PUBLIC_HISTORY_ENABLED: "true"
      PUBLIC_HISTORY_LOOKBACK_DAYS: "400"
      PUBLIC_HISTORY_MAX_BARS: "260"
      PUBLIC_HISTORY_CONCURRENCY: "4"
      MARKET_NEWS_ENABLED: "true"
      MARKET_NEWS_MAX_ITEMS: "6"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Validate deterministic workflow
        run: npm test
      - name: Validate protected market-data configuration
        run: |
          if [ -z "$TT_BRIDGE_API_KEY" ]; then
            echo "Required market-data credential is not configured."
            exit 1
          fi
      - name: Resolve New York report date
        id: report
        env:
          INPUT_REPORT_DATE: ${{ inputs.report_date }}
        run: |
          if [ -n "$INPUT_REPORT_DATE" ]; then
            report_date="$INPUT_REPORT_DATE"
          else
            report_date="$(TZ=America/New_York date +%F)"
          fi
          echo "date=$report_date" >> "$GITHUB_OUTPUT"
      - name: Generate one authoritative daily edition
        id: generate
        env:
          FORCE_RUN: ${{ inputs.force }}
        run: |
          args=("${{ steps.report.outputs.date }}")
          if [ "$FORCE_RUN" = "true" ]; then args+=(force); fi
          set +e
          npm run generate:daily -- "${args[@]}"
          code=$?
          set -e
          if [ "$code" -eq 75 ]; then
            echo "generated=false" >> "$GITHUB_OUTPUT"
            echo "No fresh session was available; the prior valid edition remains published."
            exit 0
          fi
          if [ "$code" -ne 0 ]; then exit "$code"; fi
          echo "generated=true" >> "$GITHUB_OUTPUT"
      - name: Verify report archive
        if: steps.generate.outputs.generated == 'true'
        env:
          EXPECTED_REPORT_DATE: ${{ steps.report.outputs.date }}
        run: npm run verify:reports -- "${{ steps.report.outputs.date }}"
      - name: Commit report and graphics
        if: steps.generate.outputs.generated == 'true'
        id: commit
        run: |
          git config user.name "RFDELTA LLC"
          git config user.email "rfdeltax@gmail.com"
          git add data/reports data/market-history data/datasets data/training public/charts
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Add top option trades for ${{ steps.report.outputs.date }}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Vercel deployment
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          else
            echo "Vercel Git integration will deploy the committed report."
          fi
      - name: Verify production publication
        if: steps.commit.outputs.changed == 'true'
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          EXPECTED_DATE: ${{ steps.report.outputs.date }}
        run: |
          base_url="${PRODUCTION_URL:-https://rfdelta-daily-top-option-trades.vercel.app}"
          expected_report_id="$(node -e 'const fs=require("fs");const date=process.env.EXPECTED_DATE;console.log(JSON.parse(fs.readFileSync(`data/reports/${date}/report.json`,"utf8")).reportId)')"
          for attempt in $(seq 1 30); do
            published_report_id="$(curl -fsS "$base_url/api/latest?attempt=$attempt" | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{try{console.log(JSON.parse(d).reportId??"")}catch{console.log("")}})')" || true
            if [ "$published_report_id" = "$expected_report_id" ]; then
              echo "Published $EXPECTED_DATE with report identity $expected_report_id"
              exit 0
            fi
            sleep 10
          done
          echo "Production did not publish the expected $EXPECTED_DATE report identity within five minutes."
          exit 1

  closing-prints:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_mode == 'closing_prints') ||
      github.event.schedule == '20 16 * * 1-5' ||
      github.event.schedule == '5 17 * * 1-5'
    runs-on: ubuntu-latest
    env:
      PUBLIC_HISTORY_MAX_BARS: "260"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Validate closing-print workflow
        run: npm run test:closes
      - name: Resolve New York close date
        id: report
        env:
          INPUT_REPORT_DATE: ${{ inputs.report_date }}
        run: |
          if [ -n "$INPUT_REPORT_DATE" ]; then
            report_date="$INPUT_REPORT_DATE"
          else
            report_date="$(TZ=America/New_York date +%F)"
          fi
          echo "date=$report_date" >> "$GITHUB_OUTPUT"
      - name: Collect official closing prints
        id: collect
        run: |
          set +e
          npm run collect:closes -- "${{ steps.report.outputs.date }}"
          code=$?
          set -e
          if [ "$code" -eq 75 ]; then
            echo "captured=false" >> "$GITHUB_OUTPUT"
            echo "The finalized close is not available yet; the recovery schedule will retry."
            exit 0
          fi
          if [ "$code" -ne 0 ]; then exit "$code"; fi
          echo "captured=true" >> "$GITHUB_OUTPUT"
      - name: Verify updated reports
        if: steps.collect.outputs.captured == 'true'
        run: |
          npm run verify:reports
          npm run verify:closes -- "${{ steps.report.outputs.date }}"
      - name: Commit closing prints and updated charts
        if: steps.collect.outputs.captured == 'true'
        id: commit
        run: |
          git config user.name "RFDELTA LLC"
          git config user.email "rfdeltax@gmail.com"
          git add data/reports data/market-history public/charts
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Record closing prints for ${{ steps.report.outputs.date }}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Vercel deployment
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          else
            echo "Vercel Git integration will deploy the committed close history."
          fi
      - name: Verify production closing prints
        if: steps.commit.outputs.changed == 'true'
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          EXPECTED_DATE: ${{ steps.report.outputs.date }}
        run: |
          base_url="${PRODUCTION_URL:-https://rfdelta-daily-top-option-trades.vercel.app}"
          for attempt in $(seq 1 30); do
            state="$(curl -fsS "$base_url/api/latest?close_attempt=$attempt" | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{try{const r=JSON.parse(d),date=process.env.EXPECTED_DATE,active=(r.topTrades||[]).filter(x=>x.expiration>=date);console.log(!active.length?"complete":active.every(x=>(x.dailyCloses||[]).some(p=>p.date===date))?"captured":"")}catch{console.log("")}})')" || true
            if [ "$state" = "captured" ] || [ "$state" = "complete" ]; then
              echo "Production close state: $state"
              exit 0
            fi
            sleep 10
          done
          echo "Production did not publish the closing prints within five minutes."
          exit 1
